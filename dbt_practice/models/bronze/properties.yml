models:
  - name: bronze_date
    config:
      materialized: table
  - name: bronze_product
    config:
      materialized: table
  - name: bronze_sales
    columns: 
        - name: sales_id
          data_tests:
            - unique
            - not_null:
                config:
                    severity: warn


  - name: bronze_store
    columns: 
        - name: store_sk
          data_tests:
            - unique
            - not_null
        - name: store_name
          data_tests:
            - unique
            - accepted_values: 
                arguments: 
                    values: ['MegaMert Manhattan','MegaMart Brooklyn', 'MegaMart Austin', 'MegaMart San Jose', 'MegaMart Toronto' ]
                config: 
                    severity: warn
